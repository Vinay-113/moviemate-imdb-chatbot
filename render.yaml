services:
  - type: web
    name: moviemate-imdb-chatbot
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python3 app.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/insights
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: MOVIEMATE_BUILD_EMBEDDINGS_ON_START
        value: "0"
      - key: OMDB_API_KEY
        sync: false
